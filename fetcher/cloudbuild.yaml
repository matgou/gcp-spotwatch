steps:
  # 1. Build de l'image Docker du fetcher
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_JOB_NAME}:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_JOB_NAME}:latest'
      - '-f'
      - 'fetcher/Dockerfile'
      - '.'

  # 2. Push de l'image Docker sur Artifact Registry (versionée par tag et latest)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_JOB_NAME}:${_TAG}'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_JOB_NAME}:latest'

  # 3. Mise à jour / Déploiement du Cloud Run Job avec la nouvelle image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'beta'
      - 'run'
      - 'jobs'
      - 'deploy'
      - '${_JOB_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_JOB_NAME}:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--service-account'
      - '${_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_JOB_NAME}:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_JOB_NAME}:latest'

substitutions:
  _REGION: 'europe-west1'
  _REPO_NAME: 'spot-capacity-repo'
  _JOB_NAME: 'spot-capacity-fetcher'
  _SA_NAME: 'spot-capacity-fetcher-sa'
  _TAG: 'latest'

options:
  logging: CLOUD_LOGGING_ONLY

